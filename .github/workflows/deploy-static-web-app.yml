name: Deploy Infra + App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Serialize deployments to this SWA. SWA's deployment service cancels older
# runs when newer ones arrive (surfacing as "Deployment Canceled"), so we
# guarantee at most one active run per ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  RESOURCE_GROUP: rg-blue-swallow
  LOCATION: westus2
  DNS_ZONE_RESOURCE_GROUP: rg-blue-swallow
  DNS_ZONE_NAME: blueswallow.net
  APEX_DOMAIN: blueswallow.net
  WWW_DOMAIN: www.blueswallow.net

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    outputs:
      backendEchoBaseUrl: ${{ steps.deploy.outputs.backendEchoBaseUrl }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create --name "$RESOURCE_GROUP" --location "$LOCATION"

      - name: Ensure resource providers are registered
        run: |
          for ns in Microsoft.Compute Microsoft.Network Microsoft.Web Microsoft.DevTestLab; do
            state=$(az provider show --namespace "$ns" --query registrationState -o tsv)
            if [ "$state" != "Registered" ]; then
              echo "Registering $ns (current state: $state)..."
              az provider register --namespace "$ns" --wait
            fi
          done

      - name: Validate SSH public key format
        env:
          SSH_KEY: ${{ secrets.VM_SSH_PUBLIC_KEY }}
        run: |
          # Trim whitespace/newlines, then sanity-check it's a real OpenSSH public key.
          trimmed=$(printf '%s' "$SSH_KEY" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          if [ -z "$trimmed" ]; then
            echo "::error::VM_SSH_PUBLIC_KEY secret is empty."
            exit 1
          fi
          case "$trimmed" in
            ssh-rsa*|ssh-ed25519*|ecdsa-sha2-*) ;;
            *)
              echo "::error::VM_SSH_PUBLIC_KEY does not look like an OpenSSH public key (must start with ssh-rsa, ssh-ed25519, or ecdsa-sha2-*)."
              exit 1
              ;;
          esac
          echo "SSH public key looks well-formed (length=${#trimmed})."

      - name: Deploy infrastructure
        id: deploy
        env:
          SSH_KEY: ${{ secrets.VM_SSH_PUBLIC_KEY }}
        run: |
          # Trim any stray whitespace/newlines from the secret before passing to az.
          ssh_key=$(printf '%s' "$SSH_KEY" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          set +e
          out=$(az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name main \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json \
            --parameters sshPublicKey="$ssh_key" \
            --query properties.outputs -o json 2>az_stderr.log)
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            echo "::group::Deployment stderr"
            cat az_stderr.log
            echo "::endgroup::"
            echo "::group::Failed deployment operations (top-level)"
            az deployment operation group list \
              --resource-group "$RESOURCE_GROUP" \
              --name main \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName, type:properties.targetResource.resourceType, status:properties.statusMessage}" \
              -o json || true
            echo "::endgroup::"
            echo "::group::Failed deployment operations (vm-echo-lab module)"
            az deployment operation group list \
              --resource-group "$RESOURCE_GROUP" \
              --name vm-echo-lab \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName, type:properties.targetResource.resourceType, status:properties.statusMessage}" \
              -o json || true
            echo "::endgroup::"
            exit $rc
          fi
          backend=$(echo "$out" | jq -r '.backendEchoBaseUrl.value')
          echo "backendEchoBaseUrl=$backend" >> "$GITHUB_OUTPUT"

      - name: Wire runtime app settings into SWA
        env:
          BLUE_SWALLOW_PASSCODE_SHA256: ${{ secrets.BLUE_SWALLOW_PASSCODE_SHA256 }}
          BLUE_SWALLOW_OPERATOR_TOKEN_SIGNING_KEY: ${{ secrets.BLUE_SWALLOW_OPERATOR_TOKEN_SIGNING_KEY }}
        run: |
          passcode_hash=$(printf '%s' "$BLUE_SWALLOW_PASSCODE_SHA256" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          signing_key=$(printf '%s' "$BLUE_SWALLOW_OPERATOR_TOKEN_SIGNING_KEY" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          if [ -z "$passcode_hash" ] || [ -z "$signing_key" ]; then
            echo "::error::BLUE_SWALLOW_PASSCODE_SHA256 and BLUE_SWALLOW_OPERATOR_TOKEN_SIGNING_KEY secrets must be configured."
            exit 1
          fi
          if ! printf '%s' "$passcode_hash" | grep -Eq '^[a-fA-F0-9]{64}$'; then
            echo "::error::BLUE_SWALLOW_PASSCODE_SHA256 must be a 64-character SHA-256 hex digest."
            exit 1
          fi
          signing_key_bytes=$(printf '%s' "$signing_key" | wc -c | tr -d ' ')
          if ! printf '%s' "$signing_key" | grep -Eq '^[a-fA-F0-9]{64,}$' && [ "$signing_key_bytes" -lt 32 ]; then
            echo "::error::BLUE_SWALLOW_OPERATOR_TOKEN_SIGNING_KEY must be at least 32 bytes, or 64+ hex characters."
            exit 1
          fi
          swa_name=$(jq -r '.parameters.staticWebAppName.value' infra/main.parameters.json)
          az staticwebapp appsettings set \
            --name "$swa_name" \
            --resource-group "$RESOURCE_GROUP" \
            --setting-names \
              BACKEND_ECHO_BASE_URL="${{ steps.deploy.outputs.backendEchoBaseUrl }}" \
              BLUE_SWALLOW_PASSCODE_SHA256="$passcode_hash" \
              BLUE_SWALLOW_OPERATOR_TOKEN_SIGNING_KEY="$signing_key"

  deploy-app:
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure public DNS zone exists
        run: |
          az network dns zone create \
            --resource-group "$DNS_ZONE_RESOURCE_GROUP" \
            --name "$DNS_ZONE_NAME" \
            --only-show-errors \
            -o none

      - name: Fetch SWA deployment token
        id: swa-token
        run: |
          swa_name=$(jq -r '.parameters.staticWebAppName.value' infra/main.parameters.json)
          token=$(az staticwebapp secrets list \
            --name "$swa_name" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.apiKey -o tsv)
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "::error::Failed to retrieve deployment token for SWA $swa_name in $RESOURCE_GROUP."
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Deploy SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "app"
          api_location: "api"
          output_location: ""

      - name: Configure custom domains
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          swa_name=$(jq -r '.parameters.staticWebAppName.value' infra/main.parameters.json)
          python3 scripts/wireup-custom-domains.py \
            "$swa_name" \
            "$RESOURCE_GROUP" \
            "$DNS_ZONE_RESOURCE_GROUP" \
            "$DNS_ZONE_NAME" \
            "" \
            "$APEX_DOMAIN" \
            "$WWW_DOMAIN"
