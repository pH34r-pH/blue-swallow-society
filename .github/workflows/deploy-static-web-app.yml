name: Deploy Infra + App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-blue-swallow
  LOCATION: westus2

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    outputs:
      backendEchoBaseUrl: ${{ steps.deploy.outputs.backendEchoBaseUrl }}
      staticWebAppName: ${{ steps.deploy.outputs.staticWebAppName }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create --name "$RESOURCE_GROUP" --location "$LOCATION"

      - name: Deploy infrastructure
        id: deploy
        run: |
          out=$(az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json \
            --parameters sshPublicKey="${{ secrets.VM_SSH_PUBLIC_KEY }}" \
            --query properties.outputs -o json)
          backend=$(echo "$out" | jq -r '.backendEchoBaseUrl.value')
          swa=$(echo "$out" | jq -r '.staticWebAppDefaultHostname.value')
          echo "backendEchoBaseUrl=$backend" >> "$GITHUB_OUTPUT"
          echo "staticWebAppName=$swa" >> "$GITHUB_OUTPUT"

      - name: Wire BACKEND_ECHO_BASE_URL into SWA app settings
        run: |
          swa_name=$(jq -r '.parameters.staticWebAppName.value' infra/main.parameters.json)
          az staticwebapp appsettings set \
            --name "$swa_name" \
            --resource-group "$RESOURCE_GROUP" \
            --setting-names BACKEND_ECHO_BASE_URL="${{ steps.deploy.outputs.backendEchoBaseUrl }}"

  deploy-app:
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "app"
          api_location: "api"
          output_location: ""
