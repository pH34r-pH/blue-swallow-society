name: Deploy Infra + App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Serialize deployments to this SWA. SWA's deployment service cancels older
# runs when newer ones arrive (surfacing as "Deployment Canceled"), so we
# guarantee at most one active run per ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  RESOURCE_GROUP: rg-blue-swallow
  LOCATION: westus2
  DNS_ZONE_RESOURCE_GROUP: rg-blue-swallow
  DNS_ZONE_NAME: blueswallow.co.in
  APEX_DOMAIN: blueswallow.co.in
  WWW_DOMAIN: www.blueswallow.co.in
  # SHA-256("blue-swallow"). Keep the canonical passcode server-side only.
  BLUE_SWALLOW_PASSCODE_SHA256: 1498079020c154198640fb47d5dba23a804f44ff805fac623c69202af9db2c80

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    outputs:
      backendApiBaseUrl: ${{ steps.deploy.outputs.backendApiBaseUrl }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create --name "$RESOURCE_GROUP" --location "$LOCATION"

      - name: Ensure resource providers are registered
        run: |
          for ns in Microsoft.Compute Microsoft.Network Microsoft.Web Microsoft.DevTestLab Microsoft.DBforPostgreSQL; do
            state=$(az provider show --namespace "$ns" --query registrationState -o tsv)
            if [ "$state" != "Registered" ]; then
              echo "Registering $ns (current state: $state)..."
              az provider register --namespace "$ns" --wait
            fi
          done

      - name: Validate SSH public key format
        env:
          SSH_KEY: ${{ secrets.VM_SSH_PUBLIC_KEY }}
        run: |
          # Trim whitespace/newlines, then sanity-check it's a real OpenSSH public key.
          trimmed=$(printf '%s' "$SSH_KEY" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          if [ -z "$trimmed" ]; then
            echo "::error::VM_SSH_PUBLIC_KEY secret is empty."
            exit 1
          fi
          case "$trimmed" in
            ssh-rsa*|ssh-ed25519*|ecdsa-sha2-*) ;;
            *)
              echo "::error::VM_SSH_PUBLIC_KEY does not look like an OpenSSH public key (must start with ssh-rsa, ssh-ed25519, or ecdsa-sha2-*)."
              exit 1
              ;;
          esac
          echo "SSH public key looks well-formed (length=${#trimmed})."

      - name: Validate PostgreSQL admin password secret
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          postgres_password=$(printf '%s' "$POSTGRES_PASSWORD" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          if [ -z "$postgres_password" ]; then
            echo "::error::POSTGRES_ADMIN_PASSWORD secret is empty."
            exit 1
          fi
          if [ ${#postgres_password} -lt 8 ]; then
            echo "::error::POSTGRES_ADMIN_PASSWORD must be at least 8 characters for Azure PostgreSQL Flexible Server."
            exit 1
          fi
          echo "::add-mask::$postgres_password"
          echo "PostgreSQL admin password secret is present."

      - name: Deploy infrastructure
        id: deploy
        env:
          SSH_KEY: ${{ secrets.VM_SSH_PUBLIC_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          # Trim any stray whitespace/newlines from secrets before passing to az.
          ssh_key=$(printf '%s' "$SSH_KEY" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          postgres_password=$(printf '%s' "$POSTGRES_PASSWORD" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          echo "::add-mask::$postgres_password"
          set +e
          out=$(az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name main \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json \
            --parameters sshPublicKey="$ssh_key" \
            --parameters postgresAdministratorPassword="$postgres_password" \
            --query properties.outputs -o json 2>az_stderr.log)
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            echo "::group::Deployment stderr"
            cat az_stderr.log
            echo "::endgroup::"
            echo "::group::Failed deployment operations (top-level)"
            az deployment operation group list \
              --resource-group "$RESOURCE_GROUP" \
              --name main \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName, type:properties.targetResource.resourceType, status:properties.statusMessage}" \
              -o json || true
            echo "::endgroup::"
            echo "::group::Failed deployment operations (vm-cybermap-api-gateway module)"
            az deployment operation group list \
              --resource-group "$RESOURCE_GROUP" \
              --name vm-cybermap-api-gateway \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName, type:properties.targetResource.resourceType, status:properties.statusMessage}" \
              -o json || true
            echo "::endgroup::"
            echo "::group::Failed deployment operations (postgres-flexible module)"
            az deployment operation group list \
              --resource-group "$RESOURCE_GROUP" \
              --name postgres-flexible \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName, type:properties.targetResource.resourceType, status:properties.statusMessage}" \
              -o json || true
            echo "::endgroup::"
            exit $rc
          fi
          backend=$(echo "$out" | jq -r '.backendApiBaseUrl.value')
          echo "backendApiBaseUrl=$backend" >> "$GITHUB_OUTPUT"

      - name: Wire runtime app settings into SWA
        env:
          CYBERMAP_BACKEND_TOKEN: ${{ secrets.CYBERMAP_BACKEND_TOKEN }}
        run: |
          if [ -z "$CYBERMAP_BACKEND_TOKEN" ]; then
            echo "::error::CYBERMAP_BACKEND_TOKEN secret is required for the SWA -> VM Cybermap proxy."
            exit 1
          fi
          echo "::add-mask::$CYBERMAP_BACKEND_TOKEN"
          swa_name=$(jq -r '.parameters.staticWebAppName.value' infra/main.parameters.json)
          az staticwebapp appsettings set \
            --name "$swa_name" \
            --resource-group "$RESOURCE_GROUP" \
            --setting-names \
              CYBERMAP_BACKEND_BASE_URL="${{ steps.deploy.outputs.backendApiBaseUrl }}" \
              CYBERMAP_BACKEND_TOKEN="$CYBERMAP_BACKEND_TOKEN" \
              BLUE_SWALLOW_PASSCODE_SHA256="$BLUE_SWALLOW_PASSCODE_SHA256"

  deploy-app:
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SWA deployment token
        id: swa-token
        run: |
          swa_name=$(jq -r '.parameters.staticWebAppName.value' infra/main.parameters.json)
          token=$(az staticwebapp secrets list \
            --name "$swa_name" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.apiKey -o tsv)
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "::error::Failed to retrieve deployment token for SWA $swa_name in $RESOURCE_GROUP."
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Deploy SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "app"
          api_location: "api"
          output_location: ""

      - name: Configure custom domains
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          swa_name=$(jq -r '.parameters.staticWebAppName.value' infra/main.parameters.json)
          python3 scripts/wireup-custom-domains.py \
            "$swa_name" \
            "$RESOURCE_GROUP" \
            "$DNS_ZONE_RESOURCE_GROUP" \
            "$DNS_ZONE_NAME" \
            "" \
            "$APEX_DOMAIN" \
            "$WWW_DOMAIN"
