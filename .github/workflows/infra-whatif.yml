name: Infra What-If (manual)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  whatif:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Run subscription-scope what-if
        run: |
          az deployment sub what-if             --location westus2             --template-file infra/main.bicep             --parameters @infra/main.parameters.json
