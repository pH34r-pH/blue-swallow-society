name: Infra What-If (manual)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-blue-swallow
  LOCATION: westus2

jobs:
  whatif:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create --name "$RESOURCE_GROUP" --location "$LOCATION"

      - name: Run resource-group what-if
        env:
          SSH_KEY: ${{ secrets.VM_SSH_PUBLIC_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          ssh_key=$(printf '%s' "$SSH_KEY" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          postgres_password=$(printf '%s' "$POSTGRES_PASSWORD" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          if [ -z "$postgres_password" ]; then
            echo "::error::POSTGRES_ADMIN_PASSWORD secret is empty."
            exit 1
          fi
          echo "::add-mask::$postgres_password"
          az deployment group what-if \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters @infra/main.parameters.json \
            --parameters sshPublicKey="$ssh_key" \
            --parameters postgresAdministratorPassword="$postgres_password"
